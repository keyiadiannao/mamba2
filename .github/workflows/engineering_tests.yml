# G4 Sprint 3: engineering harness unit tests (no torch / no GPU).
# Matches ENGINEERING_NORTH_STAR_PLAN.md — tests/test_engineering_* + causal_lm_kv_stats.
name: engineering-tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run engineering tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: >
          python -m pytest
          tests/test_engineering_path_batch_smoke.py
          tests/test_causal_lm_kv_stats.py
          tests/test_run_g3_causal_lm_compare_cli.py
          tests/test_run_engineering_cli.py
          -q
